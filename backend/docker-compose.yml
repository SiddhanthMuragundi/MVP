services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: tdc
      POSTGRES_PASSWORD: tdc
      POSTGRES_DB: tdc
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tdc"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://tdc:tdc@db:5432/tdc
      JWT_SECRET: dev-jwt-secret-change-in-production
      ENCRYPTION_KEY: ""
      CORS_ORIGINS: "http://localhost:5173,http://localhost:3000"
    ports:
      - "8000:8000"
    volumes:
      - ./app:/code/app

volumes:
  pgdata:
