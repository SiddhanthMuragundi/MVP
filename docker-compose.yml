# Full stack: Postgres + FastAPI backend + Vue frontend.
# Run everything with:  docker compose up --build
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: tdc
      POSTGRES_PASSWORD: tdc
      POSTGRES_DB: tdc
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tdc"]
      interval: 5s
      timeout: 3s
      retries: 10

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # web inbox

  backend:
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://tdc:tdc@db:5432/tdc
      JWT_SECRET: dev-jwt-secret-change-in-production
      ENCRYPTION_KEY: ""
      CORS_ORIGINS: "http://localhost:5173"
      SMTP_HOST: mailpit
      SMTP_PORT: "1025"
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8000/api
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  pgdata:
